<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Calculator body -->
  <rect x="146" y="86" width="220" height="340" rx="32" fill="#fff" fill-opacity="0.12" filter="url(#shadow)"/>

  <!-- Screen -->
  <rect x="176" y="116" width="160" height="70" rx="14" fill="#1e1b4b"/>

  <!-- Display value -->
  <text x="320" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="300" fill="#e0e7ff" text-anchor="end">42</text>

  <!-- Minimal button row -->
  <g fill="#fff" fill-opacity="0.2">
    <rect x="176" y="216" width="44" height="44" rx="10"/>
    <rect x="234" y="216" width="44" height="44" rx="10"/>
    <rect x="292" y="216" width="44" height="44" rx="10"/>
  </g>

  <!-- Accent operator button -->
  <rect x="176" y="286" width="160" height="44" rx="10" fill="#f59e0b"/>
  <text x="256" y="316" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#fff" text-anchor="middle">+</text>

  <!-- Bottom buttons -->
  <g fill="#fff" fill-opacity="0.2">
    <rect x="176" y="356" width="74" height="44" rx="10"/>
    <rect x="262" y="356" width="74" height="44" rx="10"/>
  </g>
</svg>
