<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="plus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Bold plus symbol -->
  <g filter="url(#shadow)">
    <rect x="216" y="136" width="80" height="240" rx="20" fill="url(#plus)"/>
    <rect x="136" y="216" width="240" height="80" rx="20" fill="url(#plus)"/>
  </g>

  <!-- Subtle calculator body outline -->
  <rect x="156" y="86" width="200" height="340" rx="24" fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="2"/>
</svg>
