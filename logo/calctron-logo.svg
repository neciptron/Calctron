<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main body -->
  <rect x="100" y="40" width="312" height="432" rx="40" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Screen -->
  <rect x="130" y="70" width="252" height="100" rx="16" fill="url(#screen)" stroke="#a78bfa" stroke-width="2"/>

  <!-- Display text -->
  <text x="360" y="135" font-family="'SF Pro', -apple-system, sans-serif" font-size="48" font-weight="300" fill="#e0e7ff" text-anchor="end" letter-spacing="-2">42.7</text>

  <!-- Button grid -->
  <g fill="#c4b5fd" font-family="'SF Pro', -apple-system, sans-serif" font-size="22" font-weight="500" text-anchor="middle">
    <!-- Row 1 -->
    <rect x="130" y="195" width="52" height="52" rx="12" fill="#4338ca"/>
    <text x="156" y="229" fill="#fff">C</text>
    <rect x="196" y="195" width="52" height="52" rx="12" fill="#4338ca"/>
    <text x="222" y="229" fill="#fff">±</text>
    <rect x="262" y="195" width="52" height="52" rx="12" fill="#4338ca"/>
    <text x="288" y="229" fill="#fff">%</text>
    <rect x="328" y="195" width="52" height="52" rx="12" fill="#f59e0b"/>
    <text x="354" y="230" fill="#fff" font-size="26">÷</text>

    <!-- Row 2 -->
    <rect x="130" y="260" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="156" y="294" fill="#fff">7</text>
    <rect x="196" y="260" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="222" y="294" fill="#fff">8</text>
    <rect x="262" y="260" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="288" y="294" fill="#fff">9</text>
    <rect x="328" y="260" width="52" height="52" rx="12" fill="#f59e0b"/>
    <text x="354" y="295" fill="#fff" font-size="26">×</text>

    <!-- Row 3 -->
    <rect x="130" y="325" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="156" y="359" fill="#fff">4</text>
    <rect x="196" y="325" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="222" y="359" fill="#fff">5</text>
    <rect x="262" y="325" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="288" y="359" fill="#fff">6</text>
    <rect x="328" y="325" width="52" height="52" rx="12" fill="#f59e0b"/>
    <text x="354" y="360" fill="#fff" font-size="26">−</text>

    <!-- Row 4 -->
    <rect x="130" y="390" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="156" y="424" fill="#fff">1</text>
    <rect x="196" y="390" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="222" y="424" fill="#fff">2</text>
    <rect x="262" y="390" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="288" y="424" fill="#fff">3</text>
    <rect x="328" y="390" width="52" height="52" rx="12" fill="#f59e0b"/>
    <text x="354" y="425" fill="#fff" font-size="26">+</text>

    <!-- Row 5 -->
    <rect x="130" y="455" width="114" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="187" y="489" fill="#fff" font-size="22">0</text>
    <rect x="258" y="455" width="52" height="52" rx="12" fill="#ffffff" fill-opacity="0.15"/>
    <text x="284" y="489" fill="#fff" font-size="28">.</text>
    <rect x="328" y="455" width="52" height="52" rx="12" fill="#10b981"/>
    <text x="354" y="489" fill="#fff" font-size="26">=</text>
  </g>

  <!-- Accent dot -->
  <circle cx="410" cy="100" r="4" fill="#a78bfa" filter="url(#glow)"/>
</svg>
