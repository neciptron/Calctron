<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Central calculation symbol -->
  <g>
    <!-- Horizontal bar -->
    <rect x="156" y="236" width="200" height="40" rx="20" fill="#fff" fill-opacity="0.9"/>
    <!-- Vertical bar -->
    <rect x="236" y="156" width="40" height="200" rx="20" fill="#fff" fill-opacity="0.9"/>
  </g>

  <!-- Accent dots representing numbers -->
  <circle cx="156" cy="156" r="16" fill="url(#accent)"/>
  <circle cx="356" cy="356" r="16" fill="url(#accent)"/>

  <!-- Subtle grid lines -->
  <g stroke="#fff" stroke-opacity="0.08" stroke-width="2">
    <line x1="156" y1="106" x2="156" y2="406"/>
    <line x1="256" y1="106" x2="256" y2="406"/>
    <line x1="356" y1="106" x2="356" y2="406"/>
    <line x1="106" y1="156" x2="406" y2="156"/>
    <line x1="106" y1="256" x2="406" y2="256"/>
    <line x1="106" y1="356" x2="406" y2="356"/>
  </g>
</svg>
