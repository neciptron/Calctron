<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="symbol" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Calculator body silhouette -->
  <rect x="166" y="96" width="180" height="320" rx="28" fill="#fff" fill-opacity="0.1"/>

  <!-- Screen -->
  <rect x="196" y="126" width="120" height="56" rx="10" fill="#0f172a"/>

  <!-- Minimal 2x2 button grid -->
  <g fill="#fff" fill-opacity="0.25">
    <rect x="196" y="216" width="52" height="52" rx="12"/>
    <rect x="264" y="216" width="52" height="52" rx="12"/>
    <rect x="196" y="286" width="52" height="52" rx="12"/>
    <rect x="264" y="286" width="52" height="52" rx="12" fill="#f59e0b"/>
  </g>

  <!-- Equals symbol on accent button -->
  <g fill="#fff">
    <rect x="278" y="302" width="24" height="4" rx="2"/>
    <rect x="278" y="314" width="24" height="4" rx="2"/>
  </g>
</svg>
