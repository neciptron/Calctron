<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="400" height="460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="opBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <rect x="40" y="20" width="320" height="420" rx="32" fill="url(#bg)"/>
  <!-- Display -->
  <rect x="60" y="40" width="280" height="64" rx="12" fill="#f8fafc"/>
  <text x="320" y="84" text-anchor="end" font-family="monospace" font-size="38" font-weight="bold" fill="#1e1b4b">10</text>
  <!-- Row 1: C, ÷, ×, − -->
  <rect x="60" y="124" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="92" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#dc2626">C</text>
  <rect x="132" y="124" width="64" height="44" rx="10" fill="url(#opBtn)"/>
  <text x="164" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">÷</text>
  <rect x="204" y="124" width="64" height="44" rx="10" fill="url(#opBtn)"/>
  <text x="236" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">×</text>
  <rect x="276" y="124" width="64" height="44" rx="10" fill="url(#opBtn)"/>
  <text x="308" y="154" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">−</text>
  <!-- Row 2: 7, 8, 9, + -->
  <rect x="60" y="176" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="92" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">7</text>
  <rect x="132" y="176" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="164" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">8</text>
  <rect x="204" y="176" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="236" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">9</text>
  <rect x="276" y="176" width="64" height="44" rx="10" fill="url(#opBtn)"/>
  <text x="308" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">+</text>
  <!-- Row 3: 4, 5, 6, = -->
  <rect x="60" y="228" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="92" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">4</text>
  <rect x="132" y="228" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="164" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">5</text>
  <rect x="204" y="228" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="236" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">6</text>
  <rect x="276" y="228" width="64" height="96" rx="10" fill="url(#opBtn)"/>
  <text x="308" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1e1b4b">=</text>
  <!-- Row 4: 1, 2, 3 -->
  <rect x="60" y="280" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="92" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">1</text>
  <rect x="132" y="280" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="164" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">2</text>
  <rect x="204" y="280" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="236" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">3</text>
  <!-- Row 5: 0 (wide), . -->
  <rect x="60" y="332" width="136" height="44" rx="10" fill="#f3f4f6"/>
  <text x="128" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e1b4b">0</text>
  <rect x="204" y="332" width="64" height="44" rx="10" fill="#f3f4f6"/>
  <text x="236" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#1e1b4b">.</text>
</svg>
