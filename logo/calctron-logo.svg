    <!-- Shadow layer -->
    <rect x="136" y="220" width="240" height="32" rx="16" fill="#000" fill-opacity="0.15"/>
    <rect x="136" y="268" width="240" height="32" rx="16" fill="#000" fill-opacity="0.15"/>
    <!-- Main layer -->
    <rect x="136" y="216" width="240" height="32" rx="16" fill="#fff"/>
    <rect x="136" y="264" width="240" height="32" rx="16" fill="#fff"/>
  </g>
</svg>
